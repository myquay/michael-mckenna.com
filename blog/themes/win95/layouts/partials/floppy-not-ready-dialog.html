<section class="device-error-dialog" id="floppy-not-ready-dialog" data-modal-window="floppy-not-ready" role="dialog" aria-modal="true" aria-labelledby="floppy-not-ready-title" aria-describedby="floppy-not-ready-message">
  <div class="setup-titlebar" data-modal-titlebar>
    <span id="floppy-not-ready-title" data-floppy-dialog-title>Removable Disk (A:)</span>
    <button class="setup-close" type="button" aria-label="Close" data-floppy-dialog-close>x</button>
  </div>
  <div class="device-error-body">
    <span class="device-error-icon" aria-hidden="true"></span>
    <div class="device-error-message" id="floppy-not-ready-message">
      <p><span data-floppy-dialog-drive>A:\</span> is not accessible.</p>
      <p>The device is not ready.</p>
    </div>
  </div>
  <div class="device-error-buttons">
    <button class="setup-button is-default" type="button" data-floppy-dialog-retry>Retry</button>
    <button class="setup-button" type="button" data-floppy-dialog-close>Cancel</button>
  </div>
</section>
