name: Build and deploy website

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-website
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  HUGO_VERSION: 0.161.1

jobs:
  verify:
    name: Verify and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          curl --fail --location --silent --show-error \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            --output /tmp/hugo.tar.gz
          tar --extract --gzip --file /tmp/hugo.tar.gz --directory /tmp hugo
          sudo install /tmp/hugo /usr/local/bin/hugo

      - name: Verify site
        run: ./scripts/verify-site.sh "${{ github.workspace }}/dist"

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: website
          path: dist
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download production artifact
        uses: actions/download-artifact@v4
        with:
          name: website
          path: dist

      - name: Log into Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sync website to Azure
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az storage blob sync \
              --account-name "${{ vars.AZURE_STORAGE_ACCOUNT }}" \
              --auth-mode login \
              --container '$web' \
              --source "${{ github.workspace }}/dist" \
              --delete-destination true \
              --only-show-errors

      - name: Purge Cloudflare cache
        run: |
          response=$(curl --fail --silent --show-error \
            "https://api.cloudflare.com/client/v4/zones/${{ vars.CLOUDFLARE_ZONE }}/purge_cache" \
            --header "Authorization: Bearer ${{ secrets.CLOUDFLARE_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          jq --exit-status '.success == true' <<< "$response" >/dev/null
